server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # Nginx 메트릭 스크랩을 위한 stub_status 활성화
    location /metrics {
        stub_status on;
        access_log off;
        allow all; # 로컬 및 Docker 네트워크 내에서 접근 허용
    }
}
